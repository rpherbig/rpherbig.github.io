<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site.data.theme.name }} - {{ page.title }}</title>
  <meta name="author" content="{{ site.data.theme.name }}" />
  <meta name="theme-color" content="#3498db" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#5bb8f5" media="(prefers-color-scheme: dark)" />
  <meta name="description" content="The blog of {{ site.data.theme.name }}" />
  <link rel="canonical" href="{{ site.url }}{{ page.url | replace:'index.html','' }}" />

  <link href="//fonts.googleapis.com/css?family=Open+Sans:400,600,800" rel="stylesheet" type="text/css">
  <link rel="shortcut icon" href="/favicon.png">
  <link rel="alternate" type="application/atom+xml" title="{{ site.data.theme.name }}" href="{{site.url}}/atom.xml" />

  <style>
    :root {
      --highlight-color: #3498db;
      --bg-color: #fff;
      --text-color: #222;
      --heading-color: #181818;
      --muted-color: #aaa;
      --subtle-color: #666;
      --border-color: #ddd;
      --border-light-color: #eee;
      --code-bg: #eef;
      --code-border: #ddd;
      --link-underline: rgba(52, 152, 219, 0.3);
      --date-color: #767676;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --highlight-color: #5bb8f5;
        --bg-color: #1a1a2e;
        --text-color: #e0e0e0;
        --heading-color: #f0f0f0;
        --muted-color: #888;
        --subtle-color: #999;
        --border-color: #333;
        --border-light-color: #2a2a2a;
        --code-bg: #252540;
        --code-border: #333;
        --link-underline: rgba(91, 184, 245, 0.3);
        --date-color: #999;
      }
    }
  </style>
  <link rel="stylesheet" href="/assets/css/all.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  {% seo %}
</head>
<body>
  <div class="container">
    <div class="sidebar">
      {% include sidebar.html %}
    </div>

    <div class="content">
      {{ content }}

      <div class="footer">
        {% include footer.html %}
      </div>
    </div>
  </div>

</body>
</html>
